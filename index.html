<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Thoth</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,500&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --ink: #f0ece4;
    --ink-soft: #a39a8c;
    --accent: #e74c3c;
    --line: #3a342b;
    --line-strong: #5a5043;
    --paper: #1a1714;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  button, input, textarea {
    color: inherit;
    font: inherit;
  }
  button, input[type="range"] {
    touch-action: manipulation;
  }
  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Fraunces', Georgia, serif;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }
  body {
    display: flex;
    flex-direction: column;
    padding: env(safe-area-inset-top, 20px) 24px env(safe-area-inset-bottom, 20px);
    min-height: 100vh;
  }

  /* Header */
  header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 12px 4px 20px;
    border-bottom: 1px solid var(--line-strong);
  }
  .logo {
    font-weight: 700;
    font-size: 18px;
    letter-spacing: -0.02em;
    font-variation-settings: "opsz" 144;
  }
  .logo span { color: var(--accent); font-style: italic; }
  .stats {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* Reader stage */
  .stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
    min-height: 0;
  }

  .word-frame {
    width: 100%;
    max-width: 720px;
    height: 200px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* The two horizontal guide marks */
  .word-frame::before,
  .word-frame::after {
    content: '';
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 14px;
    height: 1.5px;
    background: var(--accent);
  }
  .word-frame::before { top: 28px; }
  .word-frame::after { bottom: 28px; }

  .word {
    font-family: 'Newsreader', Georgia, serif;
    font-weight: 500;
    font-size: clamp(40px, 7vw, 72px);
    letter-spacing: -0.005em;
    font-variation-settings: "opsz" 72;
    white-space: nowrap;
    position: relative;
  }
  .word .left {
    color: var(--ink);
  }
  .word .pivot {
    color: var(--accent);
  }
  .word .right {
    color: var(--ink);
  }
  .word .pivot-anchor {
    position: absolute;
    left: 50%;
    width: 0;
  }

  /* Progress bar */
  .progress {
    width: 100%;
    max-width: 720px;
    height: 3px;
    background: var(--line-strong);
    margin-top: 32px;
    position: relative;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.2s ease;
  }

  .progress-label {
    margin-top: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-soft);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* Chapter bar — sits above the velocity slider, only when book has TOC */
  .chapter-bar {
    width: 100%;
    display: none;
    flex-direction: column;
    gap: 3px;
    padding: 4px 0 10px;
    background: transparent;
    border: none;
    cursor: pointer;
    text-align: left;
    transition: opacity 0.2s;
  }
  .chapter-bar.visible { display: flex; }
  .chapter-bar:hover { opacity: 0.7; }
  .chapter-bar:active { opacity: 0.45; }
  .chapter-meta {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-soft);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .book-title-text {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
    min-width: 0;
  }
  .chapter-counter { flex-shrink: 0; }
  .chapter-title-text {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 15px;
    font-weight: 500;
    color: var(--ink);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* TOC panel */
  .toc-list {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    margin: -4px;
    padding: 4px;
  }
  .toc-item {
    width: 100%;
    text-align: left;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--line);
    padding: 18px 4px;
    cursor: pointer;
    display: flex;
    align-items: baseline;
    gap: 14px;
    transition: background 0.15s;
  }
  .toc-item:hover { background: rgba(255, 255, 255, 0.03); }
  .toc-item:active { background: rgba(255, 255, 255, 0.06); }
  .toc-item .num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 0.05em;
    min-width: 28px;
    flex-shrink: 0;
  }
  .toc-item .label {
    font-family: 'Fraunces', serif;
    font-size: 16px;
    color: var(--ink);
    line-height: 1.4;
    flex: 1;
    min-width: 0;
  }
  .toc-item.current .num { color: var(--accent); font-weight: 600; }
  .toc-item.current .label { color: var(--accent); font-style: italic; font-weight: 500; }
  .toc-item .meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-soft);
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }

  /* Bookmarks */
  .add-bookmark-btn {
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 18px 24px;
    font-family: 'Fraunces', serif;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.01em;
    cursor: pointer;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: transform 0.15s, background 0.15s;
  }
  .add-bookmark-btn:active { transform: scale(0.98); background: var(--accent); }
  .add-bookmark-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    background: var(--line-strong);
    color: var(--ink-soft);
  }
  .bookmark-row {
    display: flex;
    align-items: stretch;
    border-bottom: 1px solid var(--line);
  }
  .bookmark-row:hover { background: rgba(255, 255, 255, 0.03); }
  .bookmark-item {
    flex: 1;
    min-width: 0;
    background: transparent;
    border: none;
    padding: 18px 4px;
    cursor: pointer;
    display: flex;
    align-items: baseline;
    gap: 14px;
    text-align: left;
    color: var(--ink);
  }
  .bookmark-item .label {
    font-family: 'Fraunces', serif;
    font-size: 16px;
    line-height: 1.4;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .bookmark-item .meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-soft);
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }
  .bookmark-item .icon {
    font-size: 16px;
    flex-shrink: 0;
    opacity: 0.85;
  }
  .bookmark-delete {
    background: transparent;
    border: none;
    padding: 0 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    color: var(--ink-soft);
    cursor: pointer;
    transition: color 0.15s;
  }
  .bookmark-delete:hover { color: var(--accent); }
  .bookmark-empty {
    padding: 40px 16px;
    text-align: center;
    color: var(--ink-soft);
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 15px;
  }

  /* Controls */
  .controls {
    padding-top: 24px;
    border-top: 1px solid var(--line-strong);
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .row .play-btn { padding: 18px 16px; }
  .row .icon-btn { width: 52px; height: 52px; }

  .play-btn {
    flex: 1;
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 18px 24px;
    font-family: 'Fraunces', serif;
    font-size: 17px;
    font-weight: 500;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: transform 0.15s, background 0.15s;
    border-radius: 0;
  }
  .play-btn:active { transform: scale(0.98); background: var(--accent); }

  .icon-btn {
    width: 56px;
    height: 56px;
    background: transparent;
    border: 1px solid var(--ink);
    color: var(--ink);
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    transition: background 0.15s, color 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .icon-btn:active { background: var(--ink); color: var(--paper); }

  .speed-control {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 8px 0;
  }
  .speed-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    min-width: 60px;
  }
  .speed-value {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    font-weight: 700;
    font-variation-settings: "opsz" 144;
    min-width: 90px;
    text-align: center;
  }
  .speed-value small {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 400;
    color: var(--ink-soft);
    letter-spacing: 0.1em;
    display: block;
    margin-top: -4px;
  }
  input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 3px;
    background: var(--line-strong);
    border-radius: 2px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 22px;
    height: 22px;
    background: var(--accent);
    cursor: pointer;
    border-radius: 50%;
  }
  input[type="range"]::-moz-range-thumb {
    width: 22px;
    height: 22px;
    background: var(--accent);
    cursor: pointer;
    border-radius: 50%;
    border: none;
  }

  /* Text input panel */
  .panel {
    position: fixed;
    inset: 0;
    background: var(--paper);
    z-index: 100;
    display: none;
    flex-direction: column;
    padding: env(safe-area-inset-top, 20px) 24px env(safe-area-inset-bottom, 20px);
    animation: slideUp 0.3s ease;
  }
  .panel.open { display: flex; }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 12px 4px 20px;
    border-bottom: 1px solid var(--line-strong);
    margin-bottom: 20px;
  }
  .panel-title {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 700;
    font-style: italic;
    font-variation-settings: "opsz" 144;
  }
  .close-btn {
    background: transparent;
    border: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ink);
    cursor: pointer;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 8px 12px;
  }
  textarea {
    flex: 1;
    width: 100%;
    border: 1px solid var(--line-strong);
    background: var(--bg);
    padding: 20px;
    font-family: 'Newsreader', Georgia, serif;
    font-size: 17px;
    line-height: 1.6;
    color: var(--ink);
    caret-color: var(--accent);
    resize: none;
    outline: none;
    font-variation-settings: "opsz" 16;
    transition: border-color 0.15s;
  }
  textarea::placeholder { color: var(--ink-soft); font-style: italic; }
  textarea:focus { border-color: var(--ink); }

  .panel-actions {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 16px;
  }
  .panel-actions .import-row {
    display: flex;
    gap: 12px;
  }
  .panel-actions .import-row > * { flex: 1; }
  .sample-btn {
    background: transparent;
    border: 1px solid var(--ink);
    padding: 18px 24px;
    font-family: 'Fraunces', serif;
    font-size: 14px;
    font-style: italic;
    color: var(--ink);
    cursor: pointer;
    transition: background 0.15s, color 0.15s, opacity 0.15s;
  }
  .sample-btn:active { background: var(--ink); color: var(--paper); }
  .sample-btn:disabled { opacity: 0.5; cursor: wait; }

  /* Empty state */
  .empty-hint {
    color: var(--ink-soft);
    font-style: italic;
    font-size: clamp(20px, 3.5vw, 28px);
    font-weight: 300;
    text-align: center;
  }

  /* Tap zones for navigation */
  .tap-zone {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 25%;
    z-index: 5;
    cursor: pointer;
    background: transparent;
    border: none;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .tap-zone:focus { outline: none; }
  .tap-zone:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: -4px;
  }
  .tap-zone.left { left: 0; }
  .tap-zone.right { right: 0; }
</style>
</head>
<body>

<!-- <header>
  <div class="logo">Speed<span>Reader</span></div>
  <div class="stats" id="stats">— · —</div>
</header> -->

<div class="stage">
  <button class="tap-zone left" id="tapLeft" aria-label="Skip back" type="button"></button>
  <button class="tap-zone right" id="tapRight" aria-label="Skip forward" type="button"></button>

  <div class="word-frame">
    <div class="word" id="word">
      <span class="empty-hint">paste text<br>to begin</span>
    </div>
  </div>

  <div class="progress">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <div class="progress-label" id="progressLabel">0 / 0</div>
</div>

<div class="controls">
  <button class="chapter-bar" id="chapterBar" aria-label="View chapters">
    <div class="chapter-meta">
      <span class="book-title-text" id="bookTitleText">—</span>
      <span class="chapter-counter" id="chapterCounter">— / —</span>
    </div>
    <div class="chapter-title-text" id="chapterTitle">—</div>
  </button>

  <div class="speed-control">
    <span class="speed-label">Speed</span>
    <input type="range" id="speed" min="150" max="800" step="25" value="350">
    <div class="speed-value">
      <span id="speedNum">350</span>
      <small>WPM</small>
    </div>
  </div>

  <div class="row">
    <button class="icon-btn" id="rewindBtn" aria-label="Rewind">‹‹</button>
    <button class="play-btn" id="playBtn">Start</button>
    <button class="icon-btn" id="bookmarkBtn" aria-label="Bookmarks">🔖</button>
    <button class="icon-btn" id="textBtn" aria-label="Load text">LOAD</button>
  </div>
</div>

<div class="panel" id="panel">
  <div class="panel-header">
    <div class="panel-title">Your text</div>
    <button class="close-btn" id="closePanelBtn">Close ✕</button>
  </div>
  <textarea id="textInput" placeholder="Paste the text you want to speed-read..."></textarea>
  <div class="panel-actions">
    <div class="import-row">
      <button class="sample-btn" id="epubBtn">Import EPUB</button>
      <button class="sample-btn" id="sampleBtn">Sample text</button>
    </div>
    <button class="play-btn" id="loadBtn">Load and read</button>
  </div>
  <input type="file" accept=".epub,application/epub+zip" id="epubInput" hidden>
</div>

<div class="panel" id="tocPanel">
  <div class="panel-header">
    <div class="panel-title">Chapters</div>
    <button class="close-btn" id="closeTocBtn">Close ✕</button>
  </div>
  <div class="toc-list" id="tocList"></div>
</div>

<div class="panel" id="bookmarksPanel">
  <div class="panel-header">
    <div class="panel-title">Bookmarks</div>
    <button class="close-btn" id="closeBookmarksBtn">Close ✕</button>
  </div>
  <button class="add-bookmark-btn" id="addBookmarkBtn">🔖 Save current position</button>
  <div class="toc-list" id="bookmarkList"></div>
</div>

<script>
  // --- State ---
  let words = [];
  let chapters = [];           // [{title, start, end}] word indices, empty when no TOC
  let bookmarks = [];          // [{index, chapterIdx, chapterTitle, percent, savedAt}]
  let bookTitle = '';
  let cursor = 0;
  let playing = false;
  let timer = null;
  let wpm = 350;

  const wordEl = document.getElementById('word');
  const playBtn = document.getElementById('playBtn');
  const rewindBtn = document.getElementById('rewindBtn');
  const textBtn = document.getElementById('textBtn');
  const speedSlider = document.getElementById('speed');
  const speedNum = document.getElementById('speedNum');
  const progressFill = document.getElementById('progressFill');
  const progressLabel = document.getElementById('progressLabel');
  const stats = document.getElementById('stats');
  const panel = document.getElementById('panel');
  const closePanelBtn = document.getElementById('closePanelBtn');
  const textInput = document.getElementById('textInput');
  const loadBtn = document.getElementById('loadBtn');
  const sampleBtn = document.getElementById('sampleBtn');
  const tapLeft = document.getElementById('tapLeft');
  const tapRight = document.getElementById('tapRight');
  const epubBtn = document.getElementById('epubBtn');
  const epubInput = document.getElementById('epubInput');
  const chapterBar = document.getElementById('chapterBar');
  const chapterTitle = document.getElementById('chapterTitle');
  const chapterCounter = document.getElementById('chapterCounter');
  const bookTitleText = document.getElementById('bookTitleText');
  const tocPanel = document.getElementById('tocPanel');
  const tocList = document.getElementById('tocList');
  const closeTocBtn = document.getElementById('closeTocBtn');
  const bookmarkBtn = document.getElementById('bookmarkBtn');
  const bookmarksPanel = document.getElementById('bookmarksPanel');
  const closeBookmarksBtn = document.getElementById('closeBookmarksBtn');
  const addBookmarkBtn = document.getElementById('addBookmarkBtn');
  const bookmarkList = document.getElementById('bookmarkList');

  // Optimal Recognition Point — pivot letter index based on word length
  function pivotIndex(word) {
    const len = word.length;
    if (len <= 1) return 0;
    if (len <= 5) return 1;
    if (len <= 9) return 2;
    if (len <= 13) return 3;
    return 4;
  }

  // Render a word with the pivot letter aligned to center
  function renderWord(w) {
    if (!w) {
      wordEl.innerHTML = '<span class="empty-hint">end of text</span>';
      return;
    }
    const p = pivotIndex(w);
    const left = w.slice(0, p);
    const pivot = w.slice(p, p + 1);
    const right = w.slice(p + 1);
    wordEl.innerHTML =
      '<span class="left">' + escapeHtml(left) + '</span>' +
      '<span class="pivot">' + escapeHtml(pivot) + '</span>' +
      '<span class="right">' + escapeHtml(right) + '</span>';

    // Align pivot character to center of frame
    const pivotEl = wordEl.querySelector('.pivot');
    const wordRect = wordEl.getBoundingClientRect();
    const pivotRect = pivotEl.getBoundingClientRect();
    const pivotCenter = pivotRect.left + pivotRect.width / 2;
    const frameCenter = wordRect.left + wordRect.width / 2;
    const offset = frameCenter - pivotCenter;
    wordEl.style.transform = 'translateX(' + offset + 'px)';
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }

  // Smart pacing — pause longer on punctuation and long words
  function delayFor(word) {
    const base = 60000 / wpm; // ms per word
    let factor = 1;
    if (/[.!?]$/.test(word)) factor = 2.2;
    else if (/[,;:]$/.test(word)) factor = 1.6;
    else if (word.length > 9) factor = 1.4;
    else if (word.length > 6) factor = 1.15;
    return base * factor;
  }

  function updateUI() {
    const total = words.length;
    progressLabel.textContent = (Math.min(cursor, total)) + ' / ' + total;
    progressFill.style.width = total ? (Math.min(cursor, total) / total * 100) + '%' : '0%';
    const ci = currentChapterIdx();
    if (ci >= 0 && chapterBar.classList.contains('visible')) {
      const ch = chapters[ci];
      chapterTitle.textContent = ch.title || `Chapter ${ci + 1}`;
      chapterCounter.textContent = `${ci + 1} / ${chapters.length}`;
      bookTitleText.textContent = bookTitle || 'Book';
    }
    if (!stats) return;
    if (total) {
      const remainingWords = Math.max(total - cursor, 0);
      const minsLeft = remainingWords / wpm;
      const m = Math.floor(minsLeft);
      const s = Math.round((minsLeft - m) * 60);
      stats.textContent = total + ' words · ' + (m > 0 ? m + 'm ' : '') + s + 's';
    } else {
      stats.textContent = '— · —';
    }
  }

  function tick() {
    if (cursor >= words.length) {
      stop();
      renderWord(null);
      updateUI();
      return;
    }
    const w = words[cursor];
    renderWord(w);
    updateUI();
    if (cursor % 30 === 0) persistProgress();
    const d = delayFor(w);
    cursor++;
    timer = setTimeout(tick, d);
  }

  function play() {
    if (!words.length) {
      panel.classList.add('open');
      return;
    }
    if (cursor >= words.length) cursor = 0;
    playing = true;
    playBtn.textContent = 'Pause';
    tick();
  }

  function stop() {
    playing = false;
    playBtn.textContent = cursor >= words.length ? 'Restart' : 'Continue';
    if (timer) { clearTimeout(timer); timer = null; }
    persistProgress();
  }

  function loadText(t) {
    loadBook({ title: '', chapters: [{ title: '', text: t }] });
  }

  function loadBook(book, opts = {}) {
    const { restoredIndex = 0, fromStorage = false, restoredBookmarks = null } = opts;
    bookTitle = book.title || '';
    words = [];
    chapters = [];
    bookmarks = restoredBookmarks || [];
    let offset = 0;
    for (const ch of book.chapters) {
      const chWords = ch.text.trim().split(/\s+/).filter(Boolean);
      if (!chWords.length) continue;
      chapters.push({ title: ch.title || '', start: offset, end: offset + chWords.length });
      words.push(...chWords);
      offset += chWords.length;
    }
    const hasRealChapters = chapters.length > 1 || (chapters[0] && chapters[0].title);
    chapterBar.classList.toggle('visible', hasRealChapters);
    cursor = Math.max(0, Math.min(restoredIndex, words.length - 1));
    if (words.length) {
      renderWord(words[cursor]);
      playBtn.textContent = cursor > 0 ? 'Continue' : 'Start';
    }
    updateUI();
    if (!fromStorage) persistBook();
  }

  function currentChapterIdx() {
    if (!chapters.length) return -1;
    for (let i = chapters.length - 1; i >= 0; i--) {
      if (cursor >= chapters[i].start) return i;
    }
    return 0;
  }

  function jumpToChapter(idx) {
    if (idx < 0 || idx >= chapters.length) return;
    stop();
    cursor = chapters[idx].start;
    renderWord(words[cursor]);
    updateUI();
    persistProgress();
  }

  // --- Event listeners ---
  playBtn.addEventListener('click', () => {
    if (playing) stop();
    else play();
  });

  rewindBtn.addEventListener('click', () => {
    stop();
    cursor = Math.max(0, cursor - 11); // back ~10 words
    if (words[cursor]) renderWord(words[cursor]);
    updateUI();
    persistProgress();
  });

  textBtn.addEventListener('click', () => {
    stop();
    panel.classList.add('open');
    if (!textInput.value && words.length) {
      // already loaded, leave empty
    }
  });

  closePanelBtn.addEventListener('click', () => panel.classList.remove('open'));

  loadBtn.addEventListener('click', () => {
    const t = textInput.value;
    if (!t.trim()) return;
    loadText(t);
    panel.classList.remove('open');
    play();
  });

  sampleBtn.addEventListener('click', () => {
    textInput.value = "It is a truth universally acknowledged, that a single man in possession of a good fortune, must be in want of a wife. However little known the feelings or views of such a man may be on his first entering a neighbourhood, this truth is so well fixed in the minds of the surrounding families, that he is considered as the rightful property of some one or other of their daughters. \"My dear Mr. Bennet,\" said his lady to him one day, \"have you heard that Netherfield Park is let at last?\" Mr. Bennet replied that he had not. \"But it is,\" returned she; \"for Mrs. Long has just been here, and she told me all about it.\" Mr. Bennet made no answer. \"Do not you want to know who has taken it?\" cried his wife impatiently. \"You want to tell me, and I have no objection to hearing it.\"";
  });

  speedSlider.addEventListener('input', e => {
    wpm = parseInt(e.target.value);
    speedNum.textContent = wpm;
    updateUI();
    persistProgress();
  });

  // Tap left / right to skip back / forward
  tapLeft.addEventListener('click', () => {
    if (!words.length) return;
    stop();
    cursor = Math.max(0, cursor - 6);
    renderWord(words[cursor]);
    updateUI();
    persistProgress();
  });
  tapRight.addEventListener('click', () => {
    if (!words.length) return;
    stop();
    cursor = Math.min(words.length - 1, cursor + 4);
    renderWord(words[cursor]);
    updateUI();
    persistProgress();
  });

  // Keyboard support
  document.addEventListener('keydown', e => {
    if (panel.classList.contains('open') || tocPanel.classList.contains('open')) return;
    if (e.code === 'Space') { e.preventDefault(); playing ? stop() : play(); }
    if (e.code === 'ArrowLeft') rewindBtn.click();
  });

  // Re-center on resize
  window.addEventListener('resize', () => {
    if (words[cursor - 1]) renderWord(words[cursor - 1]);
    else if (words[0]) renderWord(words[0]);
  });

  // --- TOC ---
  function renderToc() {
    const ci = currentChapterIdx();
    const total = words.length;
    tocList.innerHTML = '';
    chapters.forEach((ch, i) => {
      const btn = document.createElement('button');
      btn.className = 'toc-item' + (i === ci ? ' current' : '');
      btn.innerHTML =
        '<span class="num">' + String(i + 1).padStart(2, '0') + '</span>' +
        '<span class="label"></span>' +
        '<span class="meta">' + Math.round((ch.start / Math.max(total, 1)) * 100) + '%</span>';
      btn.querySelector('.label').textContent = ch.title || `Chapter ${i + 1}`;
      btn.addEventListener('click', () => {
        jumpToChapter(i);
        tocPanel.classList.remove('open');
      });
      tocList.appendChild(btn);
    });
    // scroll current into view
    const cur = tocList.querySelector('.toc-item.current');
    if (cur) cur.scrollIntoView({ block: 'center' });
  }

  chapterBar.addEventListener('click', () => {
    if (!chapters.length) return;
    renderToc();
    tocPanel.classList.add('open');
  });
  closeTocBtn.addEventListener('click', () => tocPanel.classList.remove('open'));

  // --- Bookmarks ---
  function addBookmark() {
    if (!words.length) return;
    if (bookmarks.some(b => b.index === cursor)) return; // skip exact duplicate
    const ci = currentChapterIdx();
    const ch = ci >= 0 ? chapters[ci] : null;
    bookmarks.unshift({
      index: cursor,
      chapterIdx: ci,
      chapterTitle: ch ? (ch.title || `Chapter ${ci + 1}`) : '',
      percent: Math.round((cursor / Math.max(words.length, 1)) * 100),
      savedAt: Date.now(),
    });
    renderBookmarks();
    persistBook();
  }

  function removeBookmark(i) {
    bookmarks.splice(i, 1);
    renderBookmarks();
    persistBook();
  }

  function jumpToBookmark(i) {
    const b = bookmarks[i];
    if (!b) return;
    stop();
    cursor = Math.max(0, Math.min(b.index, words.length - 1));
    renderWord(words[cursor]);
    updateUI();
    persistProgress();
  }

  function renderBookmarks() {
    addBookmarkBtn.disabled =
      !words.length || bookmarks.some(b => b.index === cursor);
    bookmarkList.innerHTML = '';
    if (!bookmarks.length) {
      const empty = document.createElement('div');
      empty.className = 'bookmark-empty';
      empty.textContent = 'No bookmarks yet';
      bookmarkList.appendChild(empty);
      return;
    }
    bookmarks.forEach((b, i) => {
      const row = document.createElement('div');
      row.className = 'bookmark-row';
      row.innerHTML =
        '<button class="bookmark-item">' +
          '<span class="icon">🔖</span>' +
          '<span class="label"></span>' +
          '<span class="meta">' + b.percent + '%</span>' +
        '</button>' +
        '<button class="bookmark-delete" aria-label="Delete">✕</button>';
      row.querySelector('.label').textContent = b.chapterTitle || 'Saved position';
      row.querySelector('.bookmark-item').addEventListener('click', () => {
        jumpToBookmark(i);
        bookmarksPanel.classList.remove('open');
      });
      row.querySelector('.bookmark-delete').addEventListener('click', (e) => {
        e.stopPropagation();
        removeBookmark(i);
      });
      bookmarkList.appendChild(row);
    });
  }

  bookmarkBtn.addEventListener('click', () => {
    renderBookmarks();
    bookmarksPanel.classList.add('open');
  });
  closeBookmarksBtn.addEventListener('click', () => bookmarksPanel.classList.remove('open'));
  addBookmarkBtn.addEventListener('click', addBookmark);

  // --- Persistence (IndexedDB) ---
  const DB_NAME = 'thoth';
  const STORE = 'books';
  const KEY = 'current';
  let dbPromise;
  function openDB() {
    if (!dbPromise) {
      dbPromise = new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = () => req.result.createObjectStore(STORE);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }
    return dbPromise;
  }
  async function dbGet(key) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, 'readonly');
      const req = tx.objectStore(STORE).get(key);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }
  async function dbSet(key, value) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, 'readwrite');
      tx.objectStore(STORE).put(value, key);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  }

  let saveTimer = null;
  async function doSave() {
    saveTimer = null;
    if (!words.length) return;
    try {
      await dbSet(KEY, {
        title: bookTitle,
        chapters: chapters.map(c => ({
          title: c.title,
          text: words.slice(c.start, c.end).join(' '),
        })),
        index: cursor,
        wpm,
        bookmarks,
        savedAt: Date.now(),
      });
    } catch (e) { console.warn('save failed', e); }
  }
  function persistBook() {
    if (saveTimer) { clearTimeout(saveTimer); saveTimer = null; }
    doSave();
  }
  function persistProgress() {
    if (saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(doSave, 600);
  }

  async function restoreSaved() {
    try {
      const saved = await dbGet(KEY);
      if (!saved || !saved.chapters || !saved.chapters.length) return;
      if (saved.wpm) {
        wpm = saved.wpm;
        speedSlider.value = wpm;
        speedNum.textContent = wpm;
      }
      loadBook(
        { title: saved.title, chapters: saved.chapters },
        {
          restoredIndex: saved.index || 0,
          fromStorage: true,
          restoredBookmarks: Array.isArray(saved.bookmarks) ? saved.bookmarks : [],
        }
      );
    } catch (e) { /* ignore */ }
  }
  restoreSaved();
  window.addEventListener('beforeunload', () => { if (words.length) doSave(); });

  // --- EPUB import ---
  let jszipPromise;
  function loadJSZip() {
    if (window.JSZip) return Promise.resolve(window.JSZip);
    if (!jszipPromise) {
      jszipPromise = new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js';
        s.onload = () => resolve(window.JSZip);
        s.onerror = () => reject(new Error('Could not load JSZip'));
        document.head.appendChild(s);
      });
    }
    return jszipPromise;
  }

  async function parseEpub(file) {
    const JSZip = await loadJSZip();
    const zip = await JSZip.loadAsync(file);

    const containerFile = zip.file('META-INF/container.xml');
    if (!containerFile) throw new Error('Invalid EPUB: missing container.xml');
    const containerXml = await containerFile.async('string');
    const containerDoc = new DOMParser().parseFromString(containerXml, 'application/xml');
    const rootfile = containerDoc.querySelector('rootfile');
    if (!rootfile) throw new Error('Invalid EPUB: missing rootfile');
    const opfPath = rootfile.getAttribute('full-path');

    const opfFile = zip.file(opfPath);
    if (!opfFile) throw new Error('OPF not found');
    const opfXml = await opfFile.async('string');
    const opfDoc = new DOMParser().parseFromString(opfXml, 'application/xml');
    const opfDir = opfPath.includes('/') ? opfPath.substring(0, opfPath.lastIndexOf('/') + 1) : '';

    const bookTitle =
      opfDoc.querySelector('metadata > [*|title], metadata > title')?.textContent?.trim()
      || file.name.replace(/\.epub$/i, '');

    const manifest = {};
    opfDoc.querySelectorAll('manifest > item').forEach(item => {
      manifest[item.getAttribute('id')] = item.getAttribute('href');
    });

    const spineRefs = Array.from(opfDoc.querySelectorAll('spine > itemref'))
      .map(ref => manifest[ref.getAttribute('idref')])
      .filter(Boolean);

    const chapters = [];
    let ordinal = 0;
    for (const href of spineRefs) {
      const path = opfDir + decodeURIComponent(href.split('#')[0]);
      const f = zip.file(path);
      if (!f) continue;
      const xhtml = await f.async('string');
      const doc = new DOMParser().parseFromString(xhtml, 'text/html');
      doc.querySelectorAll('script, style').forEach(el => el.remove());
      const text = (doc.body?.textContent || '').replace(/\s+/g, ' ').trim();
      if (!text) continue;
      ordinal++;
      const title =
        doc.querySelector('h1, h2, h3')?.textContent?.replace(/\s+/g, ' ').trim()
        || doc.querySelector('title')?.textContent?.trim()
        || `Chapter ${ordinal}`;
      chapters.push({ title: title.slice(0, 120), text });
    }

    if (!chapters.length) throw new Error('No readable text found');
    return { title: bookTitle, chapters };
  }

  epubBtn.addEventListener('click', () => epubInput.click());
  epubInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const original = epubBtn.textContent;
    epubBtn.textContent = 'Processing…';
    epubBtn.disabled = true;
    try {
      const book = await parseEpub(file);
      loadBook(book);
      panel.classList.remove('open');
      play();
    } catch (err) {
      alert('Could not read EPUB: ' + err.message);
    } finally {
      epubBtn.textContent = original;
      epubBtn.disabled = false;
      epubInput.value = '';
    }
  });
</script>
</body>
</html>
